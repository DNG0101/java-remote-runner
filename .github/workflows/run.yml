name: Java Runner

on:
  workflow_dispatch:
    inputs:
      filename:
        description: Java file
        required: true
      inputdata:
        description: stdin
        required: false
      args:
        description: program arguments
        required: false
      run_id:
        description: unique id
        required: true

permissions:
  contents: write

jobs:
  run-java:
    runs-on: ubuntu-latest

    steps:

    # Checkout repository
    - name: Checkout
      uses: actions/checkout@v4

    # Install Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # Compile
    - name: Compile Java
      run: |
        mkdir work
        cp programs/${{ github.event.inputs.filename }} work/Main.java
        cd work
        javac Main.java

    # Run program safely
    - name: Execute Java
      run: |
        cd work
        echo "${{ github.event.inputs.inputdata }}" > input.txt

        timeout 15s java Main ${{ github.event.inputs.args }} < input.txt > output.txt 2>&1 || echo "Program terminated (error or timeout)" >> output.txt

    # Move output
    - name: Save Output
      run: |
        mkdir -p outputs
        cp work/output.txt outputs/${{ github.event.inputs.run_id }}.txt

    # VERY IMPORTANT FIX (push permissions)
    - name: Commit Output
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add outputs/
        git commit -m "run ${{ github.event.inputs.run_id }}" || echo "no changes"
        git pull
        git push
