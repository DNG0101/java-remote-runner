name: Java Runner

on:
  workflow_dispatch:
    inputs:
      filename:
        required: true
      inputdata:
        required: false
      args:
        required: false
      run_id:
        required: true

permissions:
  contents: write

jobs:
  run-java:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Install Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # -------------------------------
    # CREATE EXECUTION SANDBOX
    # -------------------------------
    - name: Prepare sandbox
      run: |
        mkdir runner
        cp programs/${{ github.event.inputs.filename }} runner/Main.java

    # -------------------------------
    # COMPILE
    # -------------------------------
    - name: Compile program
      run: |
        cd runner
        javac Main.java

    # -------------------------------
    # RUN PROGRAM
    # -------------------------------
    - name: Execute program
      run: |
        cd runner

        echo "${{ github.event.inputs.inputdata }}" > input.txt

        timeout 20s java Main ${{ github.event.inputs.args }} < input.txt > output.txt 2>&1 || echo "Runtime Error / Time Limit Exceeded" > output.txt

    # -------------------------------
    # SAVE OUTPUT
    # -------------------------------
    - name: Save output
      run: |
        mkdir -p outputs
        cp runner/output.txt outputs/${{ github.event.inputs.run_id }}.txt

    # -------------------------------
    # COMMIT OUTPUT BACK
    # -------------------------------
    - name: Push result
      run: |
        git config user.name "github-runner"
        git config user.email "runner@github.com"
        git add outputs/
        git commit -m "run ${{ github.event.inputs.run_id }}" || echo "No changes"
        git push
