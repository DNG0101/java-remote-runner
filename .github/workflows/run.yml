name: Java Runner

on:
  workflow_dispatch:
    inputs:
      filename:
        description: "Java file name"
        required: true
      inputdata:
        description: "stdin input"
        required: false
      args:
        description: "command line args"
        required: false
      run_id:
        description: "unique id"
        required: true

jobs:
  run-java:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Prepare
        run: |
          mkdir work
          cp programs/${{ github.event.inputs.filename }} work/Main.java

      - name: Compile
        run: |
          cd work
          javac Main.java

      - name: Execute
        run: |
          cd work
          echo "${{ github.event.inputs.inputdata }}" > input.txt
          timeout 10s java Main ${{ github.event.inputs.args }} < input.txt > output.txt 2>&1 || echo "Program terminated (timeout or error)" >> output.txt

      - name: Save output
        run: |
          mkdir -p outputs
          cp work/output.txt outputs/${{ github.event.inputs.run_id }}.txt

      - name: Commit output
        run: |
          git config user.name runner
          git config user.email runner@github.com
          git add outputs/
          git commit -m "run ${{ github.event.inputs.run_id }}" || echo "nothing to commit"
          git push
