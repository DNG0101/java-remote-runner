name: Java Runner

on:
  workflow_dispatch:
    inputs:
      filename:
        required: true
      inputdata:
        required: false
      args:
        required: false
      run_id:
        required: true

permissions:
  contents: write

jobs:
  run-java:
    runs-on: ubuntu-latest

    steps:

    # IMPORTANT: allow push
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        fetch-depth: 0

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Compile
      run: |
        cd programs
        javac "${{ github.event.inputs.filename }}"

    - name: Run Program
      run: |
        cd programs

        CLASS=$(basename "${{ github.event.inputs.filename }}" .java)

        echo "${{ github.event.inputs.inputdata }}" > input.txt

        timeout 20s java $CLASS ${{ github.event.inputs.args }} < input.txt > output.txt 2>&1 || echo "Runtime error or timeout" >> output.txt

    - name: Save Output
      run: |
        mkdir -p outputs
        cp programs/output.txt outputs/${{ github.event.inputs.run_id }}.txt

    # THIS PART FIXES EVERYTHING
    - name: Commit and Push Output
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        git add outputs/

        git commit -m "runner output ${{ github.event.inputs.run_id }}" || echo "No changes"

        git push origin HEAD:main
