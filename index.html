<!DOCTYPE html>
<html>
<head>
<title>Java Remote Compiler</title>

<style>
body{
  background:#000;
  color:#00ff88;
  font-family:monospace;
  padding:20px;
}

textarea, select, input{
  width:100%;
  background:#111;
  color:#0f0;
  border:1px solid #0f0;
  margin-top:5px;
}

button{
  background:#003300;
  color:#0f0;
  border:1px solid #0f0;
  padding:6px 12px;
  margin-top:10px;
  cursor:pointer;
}

#output{
  white-space:pre-wrap;
  border:1px solid #0f0;
  padding:10px;
  margin-top:10px;
  min-height:120px;
}
</style>
</head>

<body>

<h2>Java Online Compiler (GitHub Runner)</h2>

<label>Program</label>
<select id="files"></select>

<button onclick="loadCode()">Load</button>
<button onclick="run()">Run</button>

<h3>Source</h3>
<textarea id="code" rows="14"></textarea>

<h3>Input</h3>
<textarea id="input" rows="6"></textarea>

<h3>Arguments</h3>
<input id="args"/>

<h3>Output</h3>
<div id="output">Idle</div>

<script>

const API = "https://crimson-moon-aa01.donthulanithish53.workers.dev";

// load file list
async function list(){
 let r=await fetch(API+"/list");
 let d=await r.json();
 files.innerHTML=d.map(f=>`<option>${f}</option>`).join('');
}

// load code
async function loadCode(){
 let f=files.value;
 let r=await fetch(API+"/code?file="+f);
 code.value=await r.text();
}

// run program
async function run(){

 if(!files.value){
   alert("Select a Java file first");
   return;
 }

 output.textContent="Starting runner...";

 let r=await fetch(API+"/run",{
  method:"POST",
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
    file:files.value,
    input:input.value,
    args:args.value
  })
 });

 if(!r.ok){
   output.textContent=await r.text();
   return;
 }

 let {runId}=await r.json();
 output.textContent="GitHub runner started...\nPlease wait 40-60 seconds...";
 poll(runId);
}
 let {runId}=await r.json();

 output.textContent="Runner started...\nWaiting for GitHub VM...";
 poll(runId);
}

// polling
async function poll(id){

 let r=await fetch(API+"/output?id="+id);

 if(r.status==202){
   setTimeout(()=>poll(id),3000);
   return;
 }

 output.textContent=await r.text();
}

list();

</script>

</body>
</html>
