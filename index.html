<!DOCTYPE html>
<html>
<head>
<title>Java Remote Compiler</title>

<style>
body{
  background:#000;
  color:#00ff88;
  font-family:monospace;
  padding:20px;
}

textarea, select, input{
  width:100%;
  background:#111;
  color:#0f0;
  border:1px solid #0f0;
  margin-top:5px;
  padding:6px;
}

button{
  background:#003300;
  color:#0f0;
  border:1px solid #0f0;
  padding:6px 12px;
  margin-top:10px;
  cursor:pointer;
}

button:hover{
  background:#005500;
}

#output{
  white-space:pre-wrap;
  border:1px solid #0f0;
  padding:10px;
  margin-top:10px;
  min-height:160px;
}
</style>
</head>

<body>

<h2>Java Online Compiler (GitHub Runner)</h2>

<label>Program</label>
<select id="files"></select>

<br>
<button onclick="loadCode()">Load</button>
<button onclick="runProgram()">Run</button>

<h3>Source</h3>
<textarea id="code" rows="14" readonly></textarea>

<h3>Input (Scanner / Competitive Programming)</h3>
<textarea id="input" rows="6"></textarea>

<h3>Arguments (args[])</h3>
<input id="args"/>

<h3>Output</h3>
<div id="output">Connecting to server...</div>

<script>

const API = "https://crimson-moon-aa01.donthulanithish53.workers.dev";

// ---------------- LIST FILES ----------------
async function listFiles(){
  try{
    const r = await fetch(API + "/list");

    if(!r.ok){
      output.textContent = "Worker not reachable.\nCheck Worker URL or token.";
      return;
    }

    const filesList = await r.json();

    if(filesList.length === 0){
      output.textContent = "No Java files found in /programs folder.";
      return;
    }

    const dropdown = document.getElementById("files");
    dropdown.innerHTML = filesList.map(f=>`<option value="${f}">${f}</option>`).join('');

    output.textContent = "Ready.";
  }
  catch(e){
    output.textContent = "Cannot contact Cloudflare Worker.";
  }
}

// ---------------- LOAD SOURCE ----------------
async function loadCode(){

  const file = document.getElementById("files").value;
  if(!file) return;

  output.textContent = "Loading source...";

  const r = await fetch(API + "/code?file=" + encodeURIComponent(file));
  const txt = await r.text();

  document.getElementById("code").value = txt;
  output.textContent = "Source loaded.";
}

// ---------------- RUN PROGRAM ----------------
async function runProgram(){

  const file = document.getElementById("files").value;
  if(!file){
    alert("Select a Java file first");
    return;
  }

  output.textContent = "Starting GitHub runner...";

  const r = await fetch(API + "/run",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      file: file,
      input: document.getElementById("input").value,
      args: document.getElementById("args").value
    })
  });

  if(!r.ok){
    output.textContent = await r.text();
    return;
  }

  const data = await r.json();
  output.textContent = "GitHub VM starting...\n(First run takes ~1 minute)";
  poll(data.runId);
}

// ---------------- POLLING OUTPUT ----------------
async function poll(id){

  const r = await fetch(API + "/output?id=" + id);

  if(r.status === 202){
    setTimeout(()=>poll(id), 3000);
    return;
  }

  const txt = await r.text();
  output.textContent = txt;
}

// start
listFiles();

</script>

</body>
</html>
