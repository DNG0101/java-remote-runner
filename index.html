<!DOCTYPE html>
<html>
<head>
<title>Java Remote Compiler</title>

<style>
body{
  background:#000;
  color:#00ff88;
  font-family:monospace;
  padding:20px;
}

textarea, select, input{
  width:100%;
  background:#111;
  color:#0f0;
  border:1px solid #0f0;
  margin-top:5px;
  padding:6px;
}

button{
  background:#003300;
  color:#0f0;
  border:1px solid #0f0;
  padding:6px 12px;
  margin-top:10px;
  cursor:pointer;
}

button:hover{
  background:#005500;
}

#output{
  white-space:pre-wrap;
  border:1px solid #0f0;
  padding:10px;
  margin-top:10px;
  min-height:160px;
}
</style>
</head>

<body>

<h2>Java Online Compiler (GitHub Runner)</h2>

<label>Program</label>
<select id="files"></select>

<br>
<button onclick="loadCode()">Load</button>
<button onclick="runProgram()">Run</button>

<h3>Source</h3>
<textarea id="code" rows="14" readonly></textarea>

<h3>Input (Scanner / Competitive Programming)</h3>
<textarea id="input" rows="6"></textarea>

<h3>Arguments (args[])</h3>
<input id="args"/>

<h3>Output</h3>
<div id="output">Connecting to server...</div>

<script>

const API = "https://crimson-moon-aa01.donthulanithish53.workers.dev";

let collectedInput = "";

// ---------------- FILE LIST ----------------
async function list(){
  let r = await fetch(API + "/list");
  let d = await r.json();

  files.innerHTML = d.map(f => `<option>${f}</option>`).join('');
}

// ---------------- LOAD CODE ----------------
async function loadCode(){
  let f = files.value;
  let r = await fetch(API + "/code?file=" + f);
  code.value = await r.text();
}

// ---------------- RUN ----------------
async function run(){

  if(!files.value){
    alert("Select program first");
    return;
  }

  collectedInput = input.value;

  output.textContent = "Starting GitHub runner...";

  let r = await fetch(API + "/run",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      file:files.value,
      input:collectedInput,
      args:args.value
    })
  });

  if(!r.ok){
    output.textContent = await r.text();
    return;
  }

  let {runId} = await r.json();

  output.textContent =
  "GitHub VM starting...\n(First run takes ~1 minute)\n";

  poll(runId);
}

// ---------------- POLLING ----------------
async function poll(id){

  let r = await fetch(API + "/output?id=" + id);

  if(r.status==202){
    setTimeout(()=>poll(id),3000);
    return;
  }

  let text = await r.text();

  // ---------- INTERACTIVE DETECTOR ----------
  // Detect Java waiting for input
  if(
      text.includes("Exception in thread") &&
      text.includes("NoSuchElementException")
    ){

    let user = prompt("Program is asking for input:");

    if(user!==null){
      collectedInput += "\n" + user;
      input.value = collectedInput;
      run();   // re-run program automatically
      return;
    }
  }

  output.textContent = text;
}

list();

</script>

</body>
</html>
